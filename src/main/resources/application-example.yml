server:
  port: 20001

spring:
  datasource:
    url: jdbc:mysql://${TOKEN_DB_HOST}:${TOKEN_DB_PORT}/${TOKEN_DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
    username: ${TOKEN_DB_USER}
    password: ${TOKEN_DB_PASS}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    enabled: true

openapi:
  server-url: ${BASE_URL}

jwt:
  secret: ${JWT_SECRET}
  access-token-expire: 60000       # 1分
  refresh-token-expire: 86400000   # 1日
